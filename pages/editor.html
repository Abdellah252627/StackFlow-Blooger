<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ المحتوى | StackFlow Blogger</title>
    
    <!-- Quill Styles -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .editor-container {
            padding-top: 120px;
            padding-bottom: 60px;
            max-width: 900px;
            margin: 0 auto;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .title-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            font-size: 3rem;
            font-weight: 800;
            color: white;
            padding: 1rem 0;
            margin-bottom: 2rem;
            outline: none;
            transition: var(--transition);
        }

        .title-input:focus {
            border-color: var(--primary);
        }

        .editor-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .meta-group label {
            display: block;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .meta-group select, .meta-group input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        /* Quill Customization */
        #editor-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            min-height: 400px;
        }

        .ql-toolbar.ql-snow {
            border: none;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem !important;
        }

        .ql-container.ql-snow {
            border: none;
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
        }

        .ql-editor {
            min-height: 350px;
            color: var(--text-main);
        }

        .ql-editor.ql-blank::before {
            color: var(--text-muted);
            font-style: normal;
        }

        .ql-snow .ql-stroke { stroke: var(--text-muted) !important; }
        .ql-snow .ql-fill { fill: var(--text-muted) !important; }
        .ql-snow .ql-picker { color: var(--text-muted) !important; }

        .editor-actions {
            margin-top: 3rem;
            display: flex;
            gap: 1.5rem;
            justify-content: flex-end;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title-input { font-size: 2rem; }
            .editor-meta { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <header id="main-header" class="scrolled">
        <nav class="container">
            <div class="logo">
                <a href="../index.html" class="gradient-text">StackFlow</a>
            </div>
            <div class="nav-actions">
                <a href="../index.html" class="btn btn-outline"><i class="fa-solid fa-arrow-right"></i> العودة للرئيسية</a>
            </div>
        </nav>
    </header>

    <main class="container editor-container">
        <div class="editor-header">
            <h1>إنشاء مقال جديد</h1>
            <div class="status-indicator">
                <span class="dot green"></span> مسودة محفوظة
            </div>
        </div>

        <div class="editor-fields">
            <input type="text" class="title-input" placeholder="عنوان المقال..." id="post-title">
            
            <div class="editor-meta">
                <div class="meta-group">
                    <label>تحميل صورة الغلاف</label>
                    <input type="file" id="post-image" accept="image/*">
                </div>
                <div class="meta-group">
                    <label>التصنيف</label>
                    <select id="post-category">
                        <option value="programming">برمجة</option>
                        <option value="design">تصميم</option>
                        <option value="ai">ذكاء اصطناعي</option>
                        <option value="security">أمن سيبراني</option>
                    </select>
                </div>
            </div>

            <div id="editor-wrapper">
                <div id="editor-content"></div>
            </div>

            <div class="editor-actions">
                <button class="btn btn-outline" id="save-draft">حفظ كمسودة</button>
                <button class="btn btn-primary" id="publish-post">نشر المقال</button>
            </div>
        </div>
    </main>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="module" src="../js/editor.js"></script>
</body>
</html>
